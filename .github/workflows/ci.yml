# [SCRUM-55] QuickPOS CI/CD Pipeline - All 11 Stages
name: QuickPOS CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # Stage 10: Jira Commit Validation (runs first)
  # ─────────────────────────────────────────────
  validate-commit:
    name: "Stage 10 - Jira Commit Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Stage 1 - Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Commit Message Contains Jira ID
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"
          # Allow both [SCRUM-XXX] and standard "Merge " messages
          if echo "$COMMIT_MSG" | grep -qE '^(\[SCRUM-[0-9]+\]|Merge )'; then
            echo "✅ Valid commit message"
          else
            echo "❌ ERROR: Commit must start with [SCRUM-XXX]"
            echo "   Example: [SCRUM-55] Add CI pipeline"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Stage 3: Code Quality - runs in PARALLEL with Stage 4
  # ─────────────────────────────────────────────
  code-quality:
    name: "Stage 3 - PHP Syntax Check"
    runs-on: ubuntu-latest
    needs: validate-commit
    steps:
      - name: "Stage 1 - Checkout Code"
        uses: actions/checkout@v4

      - name: "Stage 2 - Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: "Stage 3 - Run PHP Syntax Check on All Files"
        run: |
          echo "Scanning PHP files for syntax errors..."
          find . -name ".php" -not -path "./vendor/" | while read file; do
            php -l "$file"
          done
          echo "✅ All PHP files passed syntax check"

  # ─────────────────────────────────────────────
  # Stage 4: Automated Tests - runs in PARALLEL with Stage 3
  # ─────────────────────────────────────────────
  automated-tests:
    name: "Stage 4 - PHPUnit Automated Tests"
    runs-on: ubuntu-latest
    needs: validate-commit
    steps:
      - name: "Stage 1 - Checkout Code"
        uses: actions/checkout@v4

      - name: "Stage 2 - Setup PHP"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: "Stage 4 - Run PHPUnit Tests"
        run: ./vendor/bin/phpunit --colors=always --log-junit test-results.xml

      - name: "Stage 6 - Upload Test Results as Artifact"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: phpunit-test-results
          path: test-results.xml

  # ─────────────────────────────────────────────
  # Final: Pipeline Status Check
  # ─────────────────────────────────────────────
  pipeline-complete:
    name: "Pipeline Complete - Safe to Merge"
    runs-on: ubuntu-latest
    needs: [code-quality, automated-tests]
    steps:
      - name: "Stage 7 - Confirm All Checks Passed"
        run: echo "✅ All CI stages passed. PR is approved for merge."