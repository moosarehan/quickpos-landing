# [SCRUM-55] QuickPOS CI/CD Pipeline - All 11 Stages
name: QuickPOS CI Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
  pull_request:
    branches:
      - main

jobs:

  # ─────────────────────────────────────────────
  # Stage 10: Jira Commit Validation (runs first)
  # ─────────────────────────────────────────────
  validate-commit:
    name: "Stage 10 - Jira Commit Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate Jira Ticket ID in Commit Message
        run: |
          COMMIT_MSG=$(git log -1 --pretty=%s)
          echo "Commit message: $COMMIT_MSG"
          if echo "$COMMIT_MSG" | grep -qE '^\[SCRUM-[0-9]+\]'; then
            echo "✅ Valid Jira ticket ID found."
          else
            echo "❌ Commit message must start with [SCRUM-XXX]"
            echo "   Example: [SCRUM-56] Configure branch protection rules"
            exit 1
          fi

  # ─────────────────────────────────────────────
  # Stage 3: Code Quality - runs in PARALLEL with Stage 4
  # ─────────────────────────────────────────────
  code-quality:
    name: "Stage 3 - PHP Syntax Check"
    runs-on: ubuntu-latest
    needs: validate-commit
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: PHP Syntax Check on All Files
        run: |
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file"
          done
          echo "✅ All PHP files passed syntax check."

  # ─────────────────────────────────────────────
  # Stage 4: Automated Tests - runs in PARALLEL with Stage 3
  # ─────────────────────────────────────────────
  automated-tests:
    name: "Stage 4 - PHPUnit Automated Tests"
    runs-on: ubuntu-latest
    needs: validate-commit
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHPUnit Tests
        run: ./vendor/bin/phpunit --colors=always --log-junit test-results.xml

      - name: Upload Test Results as Artifact
        if: always()
        with:
          name: phpunit-test-results
          path: test-results.xml

  # ─────────────────────────────────────────────
  # Final: Pipeline Status Check
  # ─────────────────────────────────────────────
  pipeline-status:
    name: "Pipeline Complete - Safe to Merge"
    runs-on: ubuntu-latest
    needs: [code-quality, automated-tests]
    steps:
      - name: All Checks Passed
        run: echo "✅ All CI checks passed. Safe to merge into main."
        run: echo "✅ All CI checks passed. Safe to merge into main."
